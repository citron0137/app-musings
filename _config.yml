# Jekyll / GitHub Pages 설정 — 사색 노트 (musings.rahoon.site)
#
# 본체(citron0137.github.io)와 완전히 분리된 자립 사이트.
# css/js/layout 을 자체 보유하며 본체를 참조하지 않는다.

title: 라도훈 - Musings
name: 라도훈
description: 라도훈의 사색 노트 - 개발과 일, 그리고 일상에 대한 짧은 생각들
url: https://musings.rahoon.site
baseurl: ""
lang: ko
author: 라도훈

# 테마를 쓰지 않는다.
# jekyll-theme-primer 는 /assets/css/style.css 를 만들어 붙였는데,
# 그 GitHub 문서 스타일이 루트 페이지와 전혀 다른 사이트처럼 보이게 했다.
# 레이아웃과 스타일은 _layouts/default.html + _includes/style-base.html 에 직접 둔다.
plugins:
  - jekyll-seo-tag

# 노트 본문은 _musings/ 안에 둔다.
# 루트에 두면 공개 레포를 여는 순간 파일 목록이 곧 일기 제목 목록이 된다.
# permalink 에서 :collection 을 빼 URL 은 루트에 있을 때와 똑같이 유지한다.
# (예: _musings/2026-04-21-....md → /2026-04-21-....html)
collections:
  musings:
    output: true
    permalink: /:path:output_ext

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "musings"
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - 00-docs
  - _locked
  - _inbox
  - _scripts
  - .githooks
  - README.md
  - CLAUDE.md
