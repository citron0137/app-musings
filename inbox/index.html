<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>메모</title>

    <link rel="manifest" href="/inbox/manifest.webmanifest">
    <meta name="theme-color" content="#0f1115">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="메모">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f1115'/><text x='50' y='72' font-size='58' text-anchor='middle'>📝</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">

    <!--
      외부 CDN 을 쓰지 않는다. 이 페이지는 마스터 비밀번호를 입력받는 곳이라,
      서드파티 스크립트가 하나라도 끼면 그 스크립트가 비밀번호를 가져갈 수 있다.
      스타일은 전부 인라인, 스크립트는 같은 오리진의 /js/musings-crypto.js 하나뿐.
      덤으로 오프라인에서도 화면이 깨지지 않는다.
    -->
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root { color-scheme: dark; }
        body {
            margin: 0;
            background: #0f1115;
            color: #e6e8eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                         "Noto Sans KR", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        main {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            max-width: 42rem;
            margin: 0 auto;
            padding: max(1rem, env(safe-area-inset-top)) 1rem max(1.25rem, env(safe-area-inset-bottom));
        }
        .banner {
            border-radius: 0.5rem;
            padding: 0.6rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }
        .banner--pending { background: #3a2d0b; border: 1px solid #6b5410; color: #f0d78c; }
        .banner--expiry  { background: #3a1414; border: 1px solid #7a2323; color: #f3a9a9; }
        textarea {
            flex: 1;
            min-height: 45vh;
            width: 100%;
            resize: none;
            margin-top: 0.75rem;
            padding: 1rem;
            border: 1px solid #2a2f3a;
            border-radius: 0.75rem;
            background: #171a21;
            color: #e6e8eb;
            font: inherit;
            font-size: 1rem;
            line-height: 1.7;
            outline: none;
        }
        textarea:focus { border-color: #4b5563; }
        textarea::placeholder { color: #5a6070; }
        .row { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
        button {
            font: inherit;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            padding: 0.85rem 1rem;
            cursor: pointer;
        }
        .btn-primary { flex: 1; background: #2563eb; color: #fff; font-weight: 600; }
        .btn-primary:active { background: #1d4ed8; }
        .btn-primary:disabled { opacity: 0.45; }
        .btn-ghost { background: transparent; border-color: #2a2f3a; color: #aeb4bf; font-size: 0.875rem; }
        .btn-ghost:active { background: #171a21; }
        #status { min-height: 1.25rem; margin: 0.75rem 0 0; text-align: center; font-size: 0.875rem; color: #8b929e; }
        #recent { margin-top: 1.5rem; }
        #recent[hidden] { display: none; }
        .memo-card {
            border: 1px solid #2a2f3a;
            border-radius: 0.5rem;
            background: #14171d;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .memo-card time { display: block; margin-bottom: 0.25rem; font-size: 0.75rem; color: #6b7280; }
        .memo-card p { margin: 0; font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap; color: #d5d9df; }
        #pw-sheet, #tk-sheet {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: flex-end;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
        }
        #pw-sheet[data-open="1"], #tk-sheet[data-open="1"] { display: flex; }
        #pw-form, #tk-form {
            width: 100%;
            max-width: 28rem;
            background: #171a21;
            border-radius: 1rem 1rem 0 0;
            padding: 1.25rem;
            padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
        }
        #pw-form label, #tk-form label { display: block; font-size: 0.875rem; color: #aeb4bf; }
        .sheet-title { margin: 0 0 0.5rem; font-size: 1rem; font-weight: 600; color: #e6e8eb; }
        .sheet-note { margin: 0 0 1rem; font-size: 0.8125rem; line-height: 1.5; color: #8b929e; }
        .sheet-note b { color: #aeb4bf; }
        #pw, #tk, #tk-exp {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.75rem;
            border: 1px solid #3a4150;
            border-radius: 0.5rem;
            background: #0f1115;
            color: #e6e8eb;
            font: inherit;
            font-size: 1rem;
            outline: none;
        }
        #pw:focus, #tk:focus, #tk-exp:focus { border-color: #2563eb; }
        #pw-error, #tk-error { margin: 0.5rem 0 0; font-size: 0.875rem; color: #f3a9a9; }
        #pw-error[hidden], #tk-error[hidden] { display: none; }
        @media (min-width: 640px) {
            #pw-sheet, #tk-sheet { align-items: center; }
            #pw-form, #tk-form { border-radius: 1rem; }
        }
    </style>

    <script src="/js/musings-crypto.js"></script>
</head>
<body>

<main>
    <!-- 대기 중인 메모 / 토큰 만료 임박 -->
    <div id="banners"></div>

    <!-- 쓰는 곳 — 열면 곧바로 여기 커서가 온다 -->
    <textarea id="memo" placeholder="떠오른 것을 그냥 적으세요."
              autofocus autocapitalize="sentences" spellcheck="false"></textarea>

    <div class="row">
        <button id="save" class="btn-primary">저장</button>
        <button id="show-recent" class="btn-ghost">최근</button>
    </div>

    <p id="status"></p>

    <!-- 확인용. 전체 아카이브가 아니다 — 쌓인 더미는 노트북에서 본다. -->
    <section id="recent" hidden></section>
</main>

<!-- 비밀번호는 저장을 누른 뒤에 묻는다. 인증이 생각을 가로막으면 안 된다. -->
<div id="pw-sheet">
    <form id="pw-form">
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" autocomplete="current-password" autocapitalize="off" spellcheck="false">
        <p id="pw-error" hidden></p>
        <div class="row">
            <button type="button" id="pw-cancel" class="btn-ghost" style="flex:1">취소</button>
            <button type="submit" id="pw-ok" class="btn-primary">확인</button>
        </div>
    </form>
</div>

<!--
  토큰 등록 — token.enc 가 없거나 만료됐을 때만 뜬다.
  여기서 받은 토큰으로 페이지가 스스로 token.enc 를 커밋한다 (부트스트랩).
  그래야 90일마다 오는 갱신을 노트북 없이 폰에서 끝낼 수 있다 —
  만료가 하필 출장 중에 오면, 갱신하러 노트북에 갈 때까지 메모가 큐에만 쌓인다.
-->
<div id="tk-sheet">
    <form id="tk-form">
        <p class="sheet-title">토큰 등록</p>
        <p class="sheet-note">
            GitHub fine-grained PAT — <b>app-musings</b> 저장소의 <b>Contents: Read and write</b> 만.
            만료는 <b>90일 이내</b>여야 합니다.
        </p>
        <label for="tk">토큰</label>
        <input id="tk" type="password" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="github_pat_…">
        <label for="tk-exp" style="margin-top:0.75rem">만료일</label>
        <input id="tk-exp" type="date">
        <p id="tk-error" hidden></p>
        <div class="row">
            <button type="button" id="tk-cancel" class="btn-ghost" style="flex:1">취소</button>
            <button type="submit" id="tk-ok" class="btn-primary">등록</button>
        </div>
    </form>
</div>

<script>
(function () {
    'use strict';

    const OWNER = 'citron0137';
    const REPO = 'app-musings';
    const BRANCH = 'inbox';            // main 과 공통 조상이 없는 고아 브랜치
    const DIR = 'inbox';
    const TOKEN_URL = '/token.enc';

    const DRAFT_KEY = 'musings.draft';  // 평문 — 작성 중에만 존재
    const QUEUE_KEY = 'musings.queue';  // 암호문 — 전송 실패분
    const EXPIRY_WARN_DAYS = 14;
    const MAX_TOKEN_DAYS = 90;   // 암호문이 공개되므로 유효 기간이 곧 위험 노출 창이다
    const RECENT_LIMIT = 10;

    const $ = (id) => document.getElementById(id);
    const memo = $('memo');
    const status = $('status');

    // 비번/토큰/키는 인메모리만. 탭을 닫으면 휘발된다.
    let session = null;      // { password, token, expires }
    let pendingAction = null;

    const readQueue = () => JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
    const writeQueue = (q) => localStorage.setItem(QUEUE_KEY, JSON.stringify(q));

    function kstStamp() {
        const kst = new Date(Date.now() + 9 * 3600 * 1000);
        const p = (n) => String(n).padStart(2, '0');
        return kst.getUTCFullYear() + '-' + p(kst.getUTCMonth() + 1) + '-' + p(kst.getUTCDate()) +
               '-' + p(kst.getUTCHours()) + p(kst.getUTCMinutes()) + p(kst.getUTCSeconds());
    }

    function daysUntil(dateStr) {
        return Math.ceil((new Date(dateStr + 'T23:59:59+09:00').getTime() - Date.now()) / 86400000);
    }

    function renderBanners() {
        const banners = $('banners');
        banners.textContent = '';

        const pending = readQueue().length;
        if (pending > 0) {
            const el = document.createElement('div');
            el.className = 'banner banner--pending';
            el.textContent = `아직 올라가지 않은 메모 ${pending}개 — 다음 저장 때 함께 전송됩니다.`;
            banners.append(el);
        }

        if (session && session.expires) {
            const left = daysUntil(session.expires);
            if (left <= EXPIRY_WARN_DAYS) {
                const el = document.createElement('div');
                el.className = 'banner banner--expiry';
                el.textContent = left <= 0
                    ? `토큰이 만료됐습니다 (${session.expires}). 재발급 후 encrypt-token.js 를 다시 돌리세요.`
                    : `토큰 만료까지 ${left}일 (${session.expires}). 미리 재발급하세요.`;
                banners.append(el);
            }
        }
    }

    function askPassword(action) {
        pendingAction = action;
        $('pw-error').hidden = true;
        $('pw-sheet').dataset.open = '1';
        setTimeout(() => $('pw').focus(), 50);
    }

    function closePassword() {
        $('pw-sheet').dataset.open = '';
        $('pw').value = '';
        pendingAction = null;
    }

    /** token.enc 가 없거나 만료됐을 때 — 토큰 등록 화면으로 넘기기 위한 신호 */
    function needsToken(message) {
        const err = new Error(message);
        err.needsToken = true;
        return err;
    }

    /**
     * 비번으로 token.enc 를 풀어 세션을 연다.
     * token.enc 는 서비스워커가 캐시하므로 오프라인에서도 열린다 —
     * 그래야 신호가 없어도 비밀번호를 검증하고 메모를 암호화할 수 있다.
     */
    async function openSession(password) {
        const res = await fetch(TOKEN_URL);
        if (res.status === 404) throw needsToken('토큰이 아직 등록되지 않았습니다.');
        if (!res.ok) throw new Error('token.enc 를 불러올 수 없습니다.');

        // 복호화가 실패하면 비밀번호가 틀린 것 — 토큰 등록 화면으로 보내면 안 된다.
        const payload = JSON.parse(await MusingsCrypto.decrypt(await res.text(), password));
        session = { password: password, token: payload.token, expires: payload.expires };
        renderBanners();

        if (daysUntil(payload.expires) <= 0) throw needsToken('토큰이 만료됐습니다.');
    }

    /**
     * 토큰을 비번으로 암호화해서 token.enc 로 커밋한다 — 그 토큰 자신을 써서.
     * 이 부트스트랩 덕분에 90일 갱신을 폰에서 끝낼 수 있다 (노트북 불필요).
     */
    async function registerToken(password, token, expires) {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/token.enc`;
        const headers = {
            Authorization: 'Bearer ' + token,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
        };

        // 이미 있으면 sha 가 있어야 덮어쓸 수 있다.
        let sha;
        const head = await fetch(url + '?ref=main', { headers: headers });
        if (head.ok) sha = (await head.json()).sha;
        else if (head.status !== 404) throw new Error('토큰이 저장소에 접근하지 못합니다 (' + head.status + ').');

        const enc = JSON.stringify(await MusingsCrypto.encrypt(JSON.stringify({ token: token, expires: expires }), password));
        const body = { message: 'token.enc 갱신 (만료 ' + expires + ')', content: btoa(enc), branch: 'main' };
        if (sha) body.sha = sha;

        const res = await fetch(url, { method: 'PUT', headers: headers, body: JSON.stringify(body) });
        if (!res.ok) throw new Error('token.enc 커밋 실패 — ' + res.status + ': ' + (await res.text()).slice(0, 120));

        session = { password: password, token: token, expires: expires };
        renderBanners();
    }

    async function putMemo(entry) {
        const res = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}/${entry.name}`,
            {
                method: 'PUT',
                headers: {
                    Authorization: 'Bearer ' + session.token,
                    Accept: 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'memo: ' + entry.name.replace('.enc', ''),
                    content: btoa(entry.enc),
                    branch: BRANCH
                })
            }
        );
        if (!res.ok) throw new Error('GitHub ' + res.status + ': ' + (await res.text()).slice(0, 120));
    }

    /** 큐를 비운다. 실패한 것은 큐에 남긴다. 전송에 성공한 개수를 돌려준다. */
    async function flushQueue() {
        const queue = readQueue();
        const remaining = [];
        for (const entry of queue) {
            try {
                await putMemo(entry);
            } catch (err) {
                remaining.push(entry);
            }
        }
        writeQueue(remaining);
        renderBanners();
        return queue.length - remaining.length;
    }

    async function save(password) {
        const text = memo.value.trim();
        if (!text) return;

        // 비번 검증 + 토큰 확보. 오프라인이면 서비스워커 캐시에서 token.enc 가 온다.
        if (!session || session.password !== password) await openSession(password);

        const entry = {
            name: kstStamp() + '.enc',
            enc: JSON.stringify(await MusingsCrypto.encrypt(text, password))
        };

        // 암호화가 끝나는 즉시 평문 초안을 지운다 — 전송이 실패해도 폰에는 암호문만 남는다.
        memo.value = '';
        localStorage.removeItem(DRAFT_KEY);

        writeQueue(readQueue().concat([entry]));
        renderBanners();

        const sent = await flushQueue();
        const left = readQueue().length;
        status.textContent = left === 0
            ? (sent > 1 ? `저장됨 (밀린 것 포함 ${sent}개 전송)` : '저장됨')
            : `전송 실패 — 폰에 암호문으로 보관 중 (${left}개). 신호가 잡히면 다시 저장하세요.`;
        memo.focus();
    }

    function formatStamp(name) {
        const m = name.match(/^(\d{4})-(\d{2})-(\d{2})-(\d{2})(\d{2})\d{2}$/);
        return m ? `${m[1]}.${m[2]}.${m[3]} ${m[4]}:${m[5]}` : name;
    }

    async function showRecent(password) {
        if (!session || session.password !== password) await openSession(password);

        status.textContent = '불러오는 중…';
        const listRes = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIR}?ref=${BRANCH}`,
            { headers: { Accept: 'application/vnd.github+json' } }
        );
        if (!listRes.ok) throw new Error('목록을 불러올 수 없습니다 (' + listRes.status + ')');

        const files = (await listRes.json())
            .filter((f) => f.name.endsWith('.enc'))
            .sort((a, b) => b.name.localeCompare(a.name))
            .slice(0, RECENT_LIMIT);

        const section = $('recent');
        section.textContent = '';
        section.hidden = false;

        for (const file of files) {
            let text;
            try {
                const raw = await fetch(file.download_url);
                text = await MusingsCrypto.decrypt(await raw.text(), password);
            } catch (err) {
                text = '(복호화 실패)';
            }
            const card = document.createElement('div');
            card.className = 'memo-card';
            const when = document.createElement('time');
            when.textContent = formatStamp(file.name.replace('.enc', ''));
            const body = document.createElement('p');
            body.textContent = text;
            card.append(when, body);
            section.append(card);
        }

        status.textContent = files.length ? '' : '아직 메모가 없습니다.';
    }

    async function run(fn) {
        status.textContent = '처리 중…';
        try {
            await fn();
        } catch (err) {
            if (err.needsToken && session) {
                askToken(session.password, fn, err.message);
                return;
            }
            session = null;
            MusingsCrypto.clearKeyCache();
            status.textContent = err.message;
        }
    }

    memo.addEventListener('input', () => {
        // 탭이 죽어도 글이 날아가지 않도록. 평문이지만 암호화되는 순간 지워진다.
        localStorage.setItem(DRAFT_KEY, memo.value);
    });

    $('save').addEventListener('click', () => {
        if (!memo.value.trim()) return;
        if (session) run(() => save(session.password));
        else askPassword((pw) => save(pw));
    });

    $('show-recent').addEventListener('click', () => {
        if (session) run(() => showRecent(session.password));
        else askPassword((pw) => showRecent(pw));
    });

    $('pw-cancel').addEventListener('click', closePassword);

    $('pw-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = $('pw').value;
        if (!pw) return;
        const action = pendingAction;
        $('pw-ok').disabled = true;
        status.textContent = '처리 중…';
        try {
            await action(pw);
            closePassword();
        } catch (err) {
            if (err.needsToken) {
                // 비밀번호는 맞았고 토큰만 없거나 만료된 경우 — 등록 화면으로.
                closePassword();
                askToken(pw, action, err.message);
                return;
            }
            session = null;
            MusingsCrypto.clearKeyCache();
            const error = $('pw-error');
            error.textContent = /decrypt|operation-specific/i.test(err.message)
                ? '비밀번호가 맞지 않습니다.'
                : err.message;
            error.hidden = false;
            status.textContent = '';
        } finally {
            $('pw-ok').disabled = false;
        }
    });

    // ---------- 토큰 등록 ----------

    let tokenCtx = null;   // { password, retry }

    function askToken(password, retry, reason) {
        tokenCtx = { password: password, retry: retry };
        const error = $('tk-error');
        error.textContent = reason || '';
        error.hidden = !reason;
        $('tk').value = '';
        $('tk-exp').value = '';
        // 만료일 입력을 오늘~90일로 제한한다 — UI 에서도 상한을 강제해야 구멍이 안 생긴다.
        const iso = (ms) => new Date(ms + 9 * 3600 * 1000).toISOString().slice(0, 10);
        $('tk-exp').min = iso(Date.now());
        $('tk-exp').max = iso(Date.now() + MAX_TOKEN_DAYS * 86400000);
        $('tk-sheet').dataset.open = '1';
        setTimeout(() => $('tk').focus(), 50);
    }

    function closeToken() {
        $('tk-sheet').dataset.open = '';
        $('tk').value = '';
        tokenCtx = null;
    }

    $('tk-cancel').addEventListener('click', () => {
        closeToken();
        status.textContent = '토큰이 없어 전송하지 못했습니다.';
    });

    $('tk-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!tokenCtx) return;

        const token = $('tk').value.trim();
        const expires = $('tk-exp').value;
        const error = $('tk-error');
        const fail = (msg) => { error.textContent = msg; error.hidden = false; };

        if (!token.startsWith('github_pat_')) {
            return fail('fine-grained PAT 이 아닙니다 (github_pat_ 로 시작해야 합니다). classic 토큰은 모든 공개 저장소에 쓰기 권한이 열립니다.');
        }
        if (!expires) return fail('만료일을 입력하세요.');

        const left = daysUntil(expires);
        if (left <= 0) return fail('이미 지난 날짜입니다.');
        if (left > MAX_TOKEN_DAYS) {
            return fail(`만료가 ${left}일 뒤입니다 — ${MAX_TOKEN_DAYS}일을 넘을 수 없습니다. 토큰 암호문이 공개 저장소에 올라가므로, 유효 기간이 곧 위험 노출 창입니다.`);
        }

        $('tk-ok').disabled = true;
        status.textContent = '토큰 등록 중…';
        try {
            await registerToken(tokenCtx.password, token, expires);
            const retry = tokenCtx.retry;
            const password = tokenCtx.password;
            closeToken();
            status.textContent = '토큰 등록됨';
            if (retry) await run(() => retry(password));
        } catch (err) {
            fail(err.message);
            status.textContent = '';
        } finally {
            $('tk-ok').disabled = false;
        }
    });

    const draft = localStorage.getItem(DRAFT_KEY);
    if (draft) memo.value = draft;

    renderBanners();
    memo.focus();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/inbox/sw.js').catch(() => {});
    }
})();
</script>
</body>
</html>
